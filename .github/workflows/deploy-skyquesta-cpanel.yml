name: Deploy Skyquesta to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare filtered deploy directory
        run: |
          mkdir -p deploy/skyquesta
          rsync -av --delete ./ deploy/skyquesta/ \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".cursor/" \
            --exclude "node_modules/" \
            --exclude "cgi-bin-m/.git/" \
            --exclude "error_log" \
            --exclude "*.md" \
            --exclude "DEPLOY.md" \
            --exclude ".gitignore"

      - name: Normalize connection values
        run: |
          CLEAN_HOST="$(echo "${{ secrets.CPANEL_HOST }}" | sed -E 's#^https?://##; s#/$##')"
          RAW_PORT="${{ secrets.CPANEL_PORT }}"
          DEPLOY_PORT="$RAW_PORT"
          if [ -z "$DEPLOY_PORT" ] || [ "$DEPLOY_PORT" = "2083" ]; then
            DEPLOY_PORT="22"
          fi
          echo "CPANEL_HOST_CLEAN=$CLEAN_HOST" >> "$GITHUB_ENV"
          echo "CPANEL_DEPLOY_PORT=$DEPLOY_PORT" >> "$GITHUB_ENV"
          echo "CPANEL_REMOTE_PATH_CLEAN=${{ secrets.CPANEL_REMOTE_PATH }}" >> "$GITHUB_ENV"

      - name: Upload to cPanel via SFTP
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ env.CPANEL_HOST_CLEAN }}
          username: ${{ secrets.CPANEL_USERNAME }}
          password: ${{ secrets.CPANEL_PASSWORD }}
          port: ${{ env.CPANEL_DEPLOY_PORT }}
          source: "deploy/skyquesta/*"
          target: ${{ env.CPANEL_REMOTE_PATH_CLEAN }}
          overwrite: true
