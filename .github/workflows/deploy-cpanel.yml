# Deploy to cPanel (SFTP) on push to main
name: Deploy to cPanel

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to cPanel via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          password: ${{ secrets.CPANEL_PASSWORD }}
          protocol: sftp
          port: 22
          local-dir: ./
          server-dir: ${{ secrets.CPANEL_REMOTE_PATH }}
          exclude: |
            **/.git*
            **/.github
            **/.cursor*
            **/node_modules
            **/.env
            **/*.md
            **/DEPLOY.md
            **/.gitignore
